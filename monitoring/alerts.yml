groups:
  - name: spark2scale
    rules:
      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m]) 
          / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate above 5% for 2 minutes"

      - alert: SlowLangGraphWorkflow
        expr: |
          histogram_quantile(0.95,
            rate(langgraph_execution_seconds_bucket[10m])
          ) > 120
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LangGraph P95 latency > 120s"

      - alert: QdrantSlow
        expr: |
          histogram_quantile(0.95,
            rate(qdrant_query_seconds_bucket[5m])
          ) > 1.0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Qdrant queries P95 > 1 second"